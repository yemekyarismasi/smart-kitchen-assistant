  <circle cx="34" cy="28" r="14" fill="#ffffff"/>
  <circle cx="50" cy="18" r="18" fill="#ffffff"/>
  <circle cx="66" cy="28" r="14" fill="#ffffff"/>
  
  <!-- Şapka Dolgusu -->
